services:
  - type: web
    name: luxe-store-backend
    runtime: node
    repo: https://github.com/Janvi-0620/E-COMMERCE.git
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MOCK_DATA
        value: "true"
      - key: PORT
        value: "10000"
      - key: API_PREFIX
        value: /api/v1
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_EMAIL
        sync: false
    autoDeploy: true
